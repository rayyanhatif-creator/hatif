<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7f6;
    overflow-x: hidden;
}

/* تنسيق بسيط للعنوان اللي طلبته */
.main-title {
    text-align: center;
    padding-top: 30px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px 15px;
    max-width: 1100px;
    margin: auto;
}

/* الكروت */
.card {
    background: white;
    width: 100%;
    max-width: 320px;
    padding: 25px;
    border-radius: 20px;
    border: 2px solid #e5e7eb;
    transition: 0.3s;
}

.card:hover { transform: translateY(-4px); }

h2 { margin-bottom: 10px; }

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 12px;
}

/* الأزرار */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #10b981;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #059669; }

/* QR */
#qrDisplay {
    display: flex;
    justify-content: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- إضافة الكلام اللي طلبته في البداية -->
<div class="main-title">
    <h1>أدوات واتساب الاحترافية</h1>
    <p>أنشئ روابطك وأكواد QR بكل سهولة</p>
</div>

<div class="container">

    <!-- رابط -->
    <div class="card">
        <h2>📲 رابط واتساب</h2>

        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>

        <div id="linkArea" style="display:none; margin-top:10px;">
            <input type="text" id="finalLink" readonly onclick="this.select()">

            <button onclick="copyLink()" style="margin-top:10px;">
                📋 نسخ الرابط
            </button>

            <button onclick="openLink()" style="margin-top:10px; background:#0ea5e9;">
                🚀 فتح واتساب
            </button>
        </div>
    </div>

    <!-- QR -->
    <div class="card">
        <h2>🔳 كود QR</h2>

        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>

        <div id="qrDisplay"></div>

        <!-- زر التحميل - اضفت له ID للتحكم بظهوره -->
        <button id="downloadBtn" onclick="downloadQR()" style="display:none; margin-top:10px; background:#6366f1;">
            📥 تحميل الباركود
        </button>
    </div>

</div>

<script>
function copyLink() {
    let link = document.getElementById('finalLink');
    navigator.clipboard.writeText(link.value);
    alert("تم نسخ الرابط 📋");
}

function openLink() {
    let link = document.getElementById('finalLink').value;
    if (!link) return alert("ما فيه رابط");
    window.open(link, "_blank");
}

function getWaLink(phoneId, msgId) {
    let p = document.getElementById(phoneId).value.replace(/\D/g, '');
    let m = document.getElementById(msgId).value;

    if (p.startsWith('0')) p = '966' + p.substring(1);
    else if (p.length === 9) p = '966' + p;

    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    let link = getWaLink('phone1','msg1');
    document.getElementById('finalLink').value = link;
    document.getElementById('linkArea').style.display = 'block';
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";

    let link = getWaLink('phone2','msg2');

    if (!link.includes("966")) {
        alert("اكتب رقم صحيح");
        document.getElementById('downloadBtn').style.display = 'none'; // يخفي الزر لو الرقم غلط
        return;
    }

    new QRCode(container, {
        text: link,
        width: 180,
        height: 180
    });
    
    // يظهر زر التحميل فقط لما يطلع الكود
    document.getElementById('downloadBtn').style.display = 'block';
}

/* تحميل QR */
function downloadQR() {
    let img = document.querySelector("#qrDisplay img");

    if (!img) {
        alert("سو QR أول");
        return;
    }

    let a = document.createElement("a");
    a.href = img.src;
    a.download = "whatsapp-qr.png";
    a.click();
}
</script>

</body>
</html>
