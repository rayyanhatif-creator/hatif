<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HATIF | إنشاء رابط واتساب مباشر و QR Code احترافي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* ... (نفس تنسيقاتك الرائعة السابقة) ... */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f5f7f6;color:#111827;}
.navbar{position:sticky;top:0;z-index:999;display:flex;justify-content:space-between;align-items:center;padding:18px 50px;background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.4);}
.logo{display:flex;align-items:center;gap:8px;font-size:24px;font-weight:bold;}.logo span{color:#10b981;}
.nav-links{display:flex;align-items:center;gap:25px;}.nav-links a{text-decoration:none;font-size:14px;font-weight:600;color:#4b5563;}
.btn-try{padding:10px 18px;background:linear-gradient(135deg,#10b981,#059669);border-radius:12px;color:white !important;}
.hero{padding:100px 20px;text-align:center;}.hero h1{font-size:48px;margin-bottom:15px;}.hero h1 span{color:#10b981;}
.container{display:flex;justify-content:center;gap:30px;padding:20px;flex-wrap:wrap;margin-top:-50px;}
.card{width:360px;padding:30px;border-radius:28px;background:white;box-shadow:0 15px 35px rgba(0,0,0,0.08);transition:0.4s;}
input{width:100%;padding:15px;border-radius:16px;border:1px solid #e5e7eb;margin-bottom:15px;font-family:inherit;}
button{width:100%;padding:15px;border:none;border-radius:16px;cursor:pointer;font-weight:bold;margin-bottom:10px;color:white;background:linear-gradient(135deg,#10b981,#059669);}
.btn-blue{background:linear-gradient(135deg,#0ea5e9,#0284c7);}
.btn-dark{background:linear-gradient(135deg,#111827,#374151);}

/* منطقة النتيجة - مخفية افتراضياً */
.result-area{
    margin-top:18px;
    padding-top:18px;
    border-top:2px dashed #e5e7eb;
    display:none; /* هذي أهم نقطة */
    animation:fadeIn 0.5s ease-in-out;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#qrDisplay{display:flex;justify-content:center;margin-top:20px;min-height:100px;}
.toast{position:fixed;bottom:20px;left:20px;background:#111827;color:white;padding:12px 20px;border-radius:12px;opacity:0;transition:0.4s;z-index:9999;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">HATIF<span>.</span></div>
    <div class="nav-links">
        <a href="#">الأسئلة الشائعة</a>
        <a href="#" class="btn-try">ابدأ الآن مجاناً</a>
    </div>
</nav>

<section class="hero">
    <h1>أنشئ رابط <span>واتساب</span> احترافي</h1>
    <p>بسهولة وبضغطة زر واحدة</p>
</section>

<div class="container">
    <div class="card">
        <h2>📲 رابط واتساب</h2>
        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>

        <div class="result-area" id="linkArea">
            <input type="text" id="finalLink" readonly style="background:#f0fdf4;border-color:#10b981;">
            <button onclick="copyLink()">📋 نسخ الرابط</button>
            <button onclick="openLink()" class="btn-blue">🚀 فتح واتساب</button>
        </div>
    </div>

    <div class="card">
        <h2>🔳 كود QR</h2>
        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>
        <div id="qrDisplay"></div>
        <button id="downloadBtn" class="btn-dark" style="display:none;" onclick="downloadQR()">📥 حفظ QR كصورة</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2500);
}

function getWaLink(phoneId, msgId){
    let p = document.getElementById(phoneId).value.replace(/\D/g, '');
    let m = document.getElementById(msgId).value;
    if(!p || p.length < 9) return null;
    if(p.startsWith('0')) p = '966' + p.substring(1);
    else if(p.length === 9) p = '966' + p;
    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    let link = getWaLink('phone1', 'msg1');
    if (!link) {
        showToast("يرجى إدخال رقم صحيح (مثال: 05XXXXXXXX)");
        document.getElementById('linkArea').style.display = 'none';
        return;
    }
    document.getElementById('finalLink').value = link;
    document.getElementById('linkArea').style.display = 'block'; // إظهار منطقة النسخ
    showToast("تم تجهيز الرابط ✅");
}

function copyLink(){
    let input = document.getElementById('finalLink');
    input.select();
    navigator.clipboard.writeText(input.value);
    showToast("تم النسخ للملحوظات ✅");
}

function openLink(){
    let link = document.getElementById('finalLink').value;
    if(link) window.open(link, '_blank');
}

function genQR(){
    let container = document.getElementById("qrDisplay");
    let link = getWaLink('phone2','msg2');
    if(!link){ showToast("يرجى إدخال رقم صحيح"); return; }
    container.innerHTML = "";
    new QRCode(container, { text: link, width: 180, height: 180 });
    document.getElementById("downloadBtn").style.display = "block";
    showToast("تم إنشاء QR بنجاح 🔥");
}

function downloadQR(){
    let img = document.querySelector("#qrDisplay img");
    if(!img) return;
    let link = document.createElement('a');
    link.href = img.src;
    link.download = "HATIF-QR.png";
    link.click();
}
</script>
</body>
</html>
