<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أدوات تواصل البزنس</title>
    <style>
        body { background-color: #f7f7f7; font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        /* تصميم البطاقة المطابق لهاتف */
        .card {
            background: white;
            border: 2px solid #000; /* الإطار الأسود السميك */
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            box-shadow: 8px 8px 0px #000; /* الظل الخاص بالموقع */
            text-align: center;
        }

        h2 { font-size: 20px; margin-bottom: 15px; }
        p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }

        /* ستايل "وش فايدتها" */
        .benefit-box {
            background: #eafff0; /* لون أخضر فاتح جداً */
            border: 1px solid #000;
            padding: 20px;
            border-radius: 16px;
            text-align: right;
            margin-top: 15px;
        }
        .benefit-title { font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>رابط واتساب المباشر</h2>
        <input type="text" placeholder="05XXXXXXXX" style="width:100%; padding:12px; margin-bottom:10px;">
        <button style="width:100%; padding:12px; background:#000; color:#fff; border-radius:8px;">إنشاء الرابط</button>
        
        <div class="benefit-box">
            <span class="benefit-title">💡 وش فايدتها؟</span>
            هذا الرابط يختصر عناء حفظ الرقم على العميل، ويجعل المحادثة تبدأ بضغطة زر، مما يرفع معدل إتمام صفقاتك.
        </div>
    </div>

    <div class="card">
        <h2>كود الوصول السريع (QR)</h2>
        <input type="text" placeholder="05XXXXXXXX" style="width:100%; padding:12px; margin-bottom:10px;">
        <button style="width:100%; padding:12px; background:#000; color:#fff; border-radius:8px;">إنشاء كود QR</button>
        
        <div class="benefit-box">
            <span class="benefit-title">💡 وش فايدتها؟</span>
            حوّل واجهة محلك أو فواتيرك لقنوات بيع مباشرة. العميل يمسح الكود وتفتح المحادثة جاهزة، مما يظهر احترافية مشروعك.
        </div>
    </div>

</body>
</html>
