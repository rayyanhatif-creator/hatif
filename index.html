<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f7f6; }
    .header { text-align: center; padding: 50px 20px; }
    .header h1 { font-size: 32px; }
    .header span { color: #10b981; }
    .header p { color: #666; }
    
    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 20px; }
    
    .card {
        background: white; width: 320px; padding: 25px; border-radius: 20px;
        border: 1px solid #e5e7eb;
        box-shadow: 0px 15px 0px #d1d5db, 0px 20px 40px rgba(0,0,0,0.08);
        transition: 0.3s;
    }
    .card:hover { transform: translateY(-6px); }

    h2 { margin-bottom: 10px; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #10b981; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #059669; }
    
    #qrDisplay { display: flex; justify-content: center; margin-top: 15px; }
    
    .features { padding: 60px 20px; text-align: center; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
    .feature { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; box-shadow: 0px 10px 25px rgba(0,0,0,0.07); }
    .icon { font-size: 28px; margin-bottom: 10px; }
</style>
</head>

<body>

<div class="header">
    <h1>🚀 أدوات <span>واتساب بزنس</span></h1>
    <p>حوّل الزائر إلى عميل خلال ثواني</p>
</div>

<div class="container" id="container">
    <div class="card" id="linkCard">
        <h2>📲 رابط واتساب</h2>
        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>

        <div id="linkArea" style="display:none; margin-top:15px;">
            <input type="text" id="finalLink" readonly onclick="this.select()">
            <button onclick="copyLink()" style="margin-top:10px;">📋 نسخ الرابط</button>
            <button onclick="openLink()" style="margin-top:10px; background:#0ea5e9;">🚀 فتح واتساب</button>
        </div>
    </div>

    <div class="card" id="qrCard">
        <h2>🔳 كود QR</h2>
        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>
        <div id="qrDisplay"></div>
    </div>
</div>

<div class="features">
    <h2>وش فايدته؟</h2>
    <div class="features-grid">
        <div class="feature"><div class="icon">🚀</div><h3>تواصل أسرع</h3><p>بدون حفظ الرقم، بضغطة واحدة يفتح المحادثة.</p></div>
        <div class="feature"><div class="icon">💰</div><h3>يزيد المبيعات</h3><p>سهولة التواصل تعني احتمالية بيع أكبر.</p></div>
        <div class="feature"><div class="icon">📱</div><h3>احترافية</h3><p>شكل منظم يعطي ثقة للعميل.</p></div>
        <div class="feature"><div class="icon">🔗</div><h3>انتشار أوسع</h3><p>في كل مكان = فرصة تواصل جديدة.</p></div>
    </div>
</div>

<script>
function getWaLink(phoneId, msgId) {
    let p = document.getElementById(phoneId).value.replace(/\D/g, '');
    let m = document.getElementById(msgId).value;
    if (p.startsWith('0')) p = '966' + p.substring(1);
    else if (p.length === 9) p = '966' + p;
    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    let link = getWaLink('phone1','msg1');
    document.getElementById('finalLink').value = link;
    document.getElementById('linkArea').style.display = 'block';
}

function copyLink() {
    let link = document.getElementById('finalLink');
    link.select();
    navigator.clipboard.writeText(link.value);
    alert("تم نسخ الرابط 📋");
}

function openLink() {
    let link = document.getElementById('finalLink').value;
    if (link) window.open(link, "_blank");
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";
    let link = getWaLink('phone2','msg2');
    new QRCode(container, { text: link, width: 150, height: 150 });
}
</script>

</body>
</html>
