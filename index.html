<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ روابط واتساب | أداة لبزنزك</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="card">
            <h1>منشئ روابط واتساب</h1>
            <input type="text" id="phone" placeholder="رقم الجوال (مثل: 96650xxxxxxx)">
            <input type="text" id="message" placeholder="اكتب الرسالة التلقائية (اختياري)">
            <button onclick="generateLink()">إنشاء الرابط</button>
            
            <div id="result" style="display:none;">
                <p style="margin-top: 20px; font-weight: bold;">انسخ الرابط أدناه:</p>
                <input type="text" id="finalLink" readonly style="background: #f9f9f9; padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; text-align: center;">
                <a id="waLink" href="#" target="_blank" class="btn-whatsapp">انتقل إلى واتساب</a>
            </div>
        </section>

        <section class="seo-content">
            <h2>أسرار التواصل الناجح في بزنسك</h2>
            <p>سرعة الرد هي المفتاح لبناء الثقة:</p>
            <ul>
                <li><strong>الاحترافية:</strong> الرابط المباشر يغني العميل عن حفظ رقمك.</li>
                <li><strong>التنظيم:</strong> الرسائل المحددة مسبقاً توفر وقتك.</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة لأسرة العز © 2026</p>
    </footer>

    <script>
        function generateLink() {
            // إزالة أي مسافات أو رموز + أو غيرها من الرقم
            let phone = document.getElementById('phone').value.replace(/\D/g, '');
            const msg = document.getElementById('message').value;
            
            if(phone) {
                // دمج الرسالة بشكل صحيح بدون رموز إضافية
                let link = `https://wa.me/${phone}`;
                if (msg.trim() !== "") {
                    link += `?text=${encodeURIComponent(msg)}`;
                }
                
                document.getElementById('finalLink').value = link;
                document.getElementById('waLink').href = link;
                document.getElementById('result').style.display = 'block';
            } else {
                alert("يرجى إدخال رقم جوال صحيح يبدأ بمفتاح الدولة (مثال: 966)");
            }
        }
    </script>
</body>
</html>
