<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات تواصل البزنس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0; 
        }
        .box { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; font-weight: 700; }
        input { 
            width: 100%; padding: 16px; margin-bottom: 12px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; box-sizing: border-box; font-size: 15px; 
        }
        button { 
            width: 100%; padding: 16px; background-color: #1a1d23; 
            border: none; border-radius: 12px; color: white; 
            cursor: pointer; font-size: 16px; font-weight: 600;
        }
        .link-area { margin-top: 20px; display: none; }
        #qrDisplay { display: flex; justify-content: center; margin-top: 25px; }
    </style>
</head>
<body>

<div class="box">
    <h1>رابط واتساب المباشر</h1>
    <input type="text" id="phone1" placeholder="05XXXXXXXX">
    <input type="text" id="msg1" placeholder="الرسالة التلقائية (اختياري)">
    <button onclick="genLink()">إنشاء الرابط</button>
    
    <div id="linkArea" class="link-area">
        <input type="text" id="finalLink" readonly style="text-align:center;">
        <button onclick="copyLink()" style="background:#444; margin-top:10px;">نسخ الرابط</button>
    </div>
</div>

<div class="box">
    <h1>كود الوصول السريع (QR)</h1>
    <input type="text" id="phone2" placeholder="05XXXXXXXX">
    <input type="text" id="msg2" placeholder="الرسالة التلقائية (اختياري)">
    <button onclick="genQR()">إنشاء كود QR</button>
    
    <div id="qrDisplay"></div>
</div>

<script>
    function getWaLink(pId, mId) {
        let p = document.getElementById(pId).value.replace(/\D/g, '');
        if (p.startsWith('0')) p = '966' + p.substring(1);
        else if (p.length === 9) p = '966' + p;
        let m = document.getElementById(mId).value;
        return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
    }
    function genLink() {
        document.getElementById('finalLink').value = getWaLink('phone1', 'msg1');
        document.getElementById('linkArea').style.display = 'block';
    }
    function genQR() {
        let container = document.getElementById("qrDisplay");
        container.innerHTML = "";
        new QRCode(container, { text: getWaLink('phone2', 'msg2'), width: 200, height: 200 });
    }
    function copyLink() {
        let el = document.getElementById('finalLink');
        el.select();
        document.execCommand("copy");
        alert("تم نسخ الرابط!");
    }
</script>
</body>
</html>
