<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f7f6; color: #111; }
    .header { text-align: center; padding: 50px 20px; }
    .header h1 { font-size: 34px; }
    .header span { color: #10b981; }
    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 20px; }
    
    .card {
        background: white; width: 320px; padding: 25px; border-radius: 20px;
        border: 1px solid #e5e7eb;
        box-shadow: 0px 10px 0px #d1d5db, 0 10px 25px rgba(0,0,0,0.08);
        transition: 0.3s;
    }
    
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #10b981; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #059669; }
    
    #qrDisplay { display: flex; justify-content: center; margin-top: 15px; }
    #finalLink { width: 100%; padding: 10px; text-align: center; color: #10b981; font-weight: bold; background: #f9f9f9; border: 1px solid #e5e7eb; border-radius: 10px; margin-top: 10px; }
</style>
</head>

<body>

<div class="header">
    <h1>🚀 أدوات <span>واتساب بزنس</span></h1>
    <p>حوّل عملائك من مشاهدة إلى تواصل مباشر</p>
</div>

<div class="container">
    <div class="card">
        <h2>📲 رابط واتساب</h2>
        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>
        <div id="linkArea" style="display:none;">
            <input type="text" id="finalLink" readonly>
        </div>
    </div>

    <div class="card">
        <h2>🔳 كود QR</h2>
        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>
        <div id="qrDisplay"></div>
    </div>
</div>

<script>
function getWaLink(pId, mId) {
    let p = document.getElementById(pId).value.replace(/\D/g, '');
    // تصحيح صيغة الرقم (إضافة 966)
    if (p.startsWith('0')) {
        p = '966' + p.substring(1);
    } else if (p.length === 9) {
        p = '966' + p;
    }
    
    let m = document.getElementById(mId).value.trim();
    // بناء الرابط بشكل آمن
    let url = "https://wa.me/" + p;
    if (m !== "") {
        url += "?text=" + encodeURIComponent(m);
    }
    return url;
}

function genLink() {
    let link = getWaLink('phone1', 'msg1');
    document.getElementById('finalLink').value = link;
    document.getElementById('linkArea').style.display = 'block';
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";
    let url = getWaLink('phone2', 'msg2');
    new QRCode(container, {
        text: url,
        width: 150,
        height: 150
    });
}
</script>

</body>
</html>
