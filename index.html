<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ روابط واتساب | أداة لبزنزك</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="card">
            <h1>منشئ روابط واتساب</h1>
            <input type="text" id="phone" placeholder="رقم الجوال (مثال: 9665xxxxxxxx)">
            <input type="text" id="message" placeholder="اكتب الرسالة التلقائية (اختياري)">
            <button onclick="generateLink()">إنشاء الرابط</button>
            <div id="result"></div>
        </section>

        <section class="seo-content">
            <h2>طور تواصلك في بزنزك</h2>
            <p>تسهل هذه الأداة على عملائك التواصل معك مباشرة. فقط أدخل رقمك والرسالة التي ترغب باستقبالها، واحصل على رابط احترافي لعملك.</p>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة لأسرة العز © 2026</p>
    </footer>

    <script>
        function generateLink() {
            const phone = document.getElementById('phone').value;
            const msg = document.getElementById('message').value;
            
            if(phone) {
                // دمج الرسالة في الرابط
                const encodedMsg = encodeURIComponent(msg);
                const link = msg ? `https://wa.me/${phone}?text=${encodedMsg}` : `https://wa.me/${phone}`;
                
                const resDiv = document.getElementById('result');
                resDiv.innerHTML = `
                    <p style="margin-top: 20px;">الرابط جاهز للاستخدام:</p>
                    <a href="${link}" target="_blank" style="background: #25d366; color: white; padding: 10px 20px; border-radius: 10px; display: inline-block; text-decoration: none; margin-top: 10px;">
                        انتقل إلى واتساب
                    </a>
                `;
                resDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
