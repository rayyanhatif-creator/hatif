<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f7f6; color: #111; }
    .header { text-align: center; padding: 50px 20px; }
    .header h1 { font-size: 34px; }
    .header span { color: #10b981; }
    
    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 20px; }
    
    /* تصميم الكروت مع إضافة الظل المطالب به */
    .card {
        background: white; width: 320px; padding: 25px; border-radius: 20px;
        border: 1px solid #e5e7eb;
        /* ظل مخصص ليعطي بروزاً أقوى */
        box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
        transition: 0.3s;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
    
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #10b981; color: white; font-weight: bold; cursor: pointer; }
    
    #qrDisplay { display: flex; justify-content: center; margin-top: 15px; }
    .result-link input { text-align: center; color: #10b981; font-weight: bold; background: #f9f9f9; }
</style>
</head>

<body>

<div class="header">
    <h1>🚀 أدوات <span>واتساب بزنس</span></h1>
    <p>حوّل عملائك من مشاهدة إلى تواصل مباشر</p>
</div>

<div class="container">
    <div class="card">
        <h2>📲 رابط واتساب</h2>
        <input type="text" id="phone1" placeholder="رقم الجوال (05XXXXXXXX)">
        <input type="text" id="msg1" placeholder="الرسالة التلقائية (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>
        <div id="linkArea" style="display:none; margin-top:15px;">
            <input type="text" id="finalLink" readonly>
        </div>
    </div>

    <div class="card">
        <h2>🔳 كود QR</h2>
        <input type="text" id="phone2" placeholder="رقم الجوال (05XXXXXXXX)">
        <input type="text" id="msg2" placeholder="الرسالة التلقائية (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>
        <div id="qrDisplay"></div>
    </div>
</div>

<script>
function getWaLink(pId, mId) {
    let p = document.getElementById(pId).value.replace(/\D/g, '');
    if (p.startsWith('0')) p = '966' + p.substring(1);
    else if (p.length === 9) p = '966' + p;
    let m = document.getElementById(mId).value;
    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    document.getElementById('finalLink').value = getWaLink('phone1', 'msg1');
    document.getElementById('linkArea').style.display = 'block';
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";
    new QRCode(container, { text: getWaLink('phone2', 'msg2'), width: 150, height: 150 });
}
</script>

</body>
</html>
