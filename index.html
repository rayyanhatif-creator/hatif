<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ روابط واتساب</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #result { margin-top: 20px; padding: 10px; background: #eee; border-radius: 10px; display: none; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2>منشئ روابط الواتساب</h2>
    <input type="text" id="phone" placeholder="رقم الجوال (مثال: 9665xxxxxxxx)">
    <button onclick="generateLink()">إنشاء الرابط</button>
    <div id="result"></div>
</div>

<script>
    function generateLink() {
        const phone = document.getElementById('phone').value;
        if(phone) {
            const link = `https://wa.me/${phone}`;
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = `رابطك جاهز:<br><a href="${link}" target="_blank">${link}</a>`;
            resDiv.style.display = 'block';
            
            // هنا يمكنك إضافة كود يرسل الرقم إلى قاعدة بيانات أو n8n لتعرف من استخدم الأداة
            console.log("تم إنشاء رابط لرقم: " + phone);
        }
    }
</script>
</body>
</html>
