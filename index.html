<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هاتف - تواصل بذكاء</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ستايل مستوحى من بساطة موقع هاتف */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fafafa; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #eaeaea; margin-bottom: 20px; }
        h1 { font-size: 20px; margin-bottom: 20px; text-align: center; font-weight: 600; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: #000; color: white; padding: 12px; width: 100%; border-radius: 6px; border: none; cursor: pointer; font-size: 15px; font-weight: 500; }
        button:hover { background: #333; }
        .link-area { margin-top: 20px; display: none; }
        #qrDisplay { display: flex; justify-content: center; margin-top: 20px; padding: 10px; border: 1px solid #eee; }
        .footer-note { font-size: 12px; color: #999; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h1>أداة التواصل السريع</h1>
    
    <select id="toolType" onchange="toggleTool()" style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px;">
        <option value="link">رابط واتساب</option>
        <option value="qr">كود QR</option>
    </select>

    <input type="text" id="phone" placeholder="رقم الجوال (مثال: 05XXXXXXXX)">
    <input type="text" id="msg" placeholder="الرسالة التلقائية (اختياري)">
    <button onclick="processTool()">تنفيذ العملية</button>
    
    <div id="resultArea" class="link-area">
        <div id="outputContent"></div>
    </div>
</div>

<div class="footer-note">بوابة هاتف الموحدة للخدمات الرقمية</div>

<script>
    function toggleTool() {
        document.getElementById('resultArea').style.display = 'none';
    }

    function getWaLink() {
        let p = document.getElementById('phone').value.replace(/\D/g, '');
        if (p.startsWith('0')) p = '966' + p.substring(1);
        else if (p.length === 9) p = '966' + p;
        let m = document.getElementById('msg').value;
        return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
    }

    function processTool() {
        let type = document.getElementById('toolType').value;
        let area = document.getElementById('resultArea');
        let content = document.getElementById('outputContent');
        area.style.display = 'block';
        content.innerHTML = "";

        if(type === 'link') {
            let url = getWaLink();
            content.innerHTML = `<input type="text" value="${url}" readonly style="text-align:center;">
                                 <button onclick="copyLink('${url}')" style="background:#eee; color:#000;">نسخ الرابط</button>`;
        } else {
            let qrDiv = document.createElement('div');
            qrDiv.id = "qrDisplay";
            content.appendChild(qrDiv);
            new QRCode(qrDiv, { text: getWaLink(), width: 180, height: 180 });
        }
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
        alert("تم النسخ!");
    }
</script>
</body>
</html>
