<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7f6;
    color: #111;
}

/* الهيدر */
.header {
    text-align: center;
    padding: 50px 20px;
}
.header h1 { font-size: 34px; }
.header span { color: #10b981; }
.header p { color: #666; }

/* الكونتينر */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

/* 💎 الكرت الفخم */
.card {
    position: relative;
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 22px;
    border: 1px solid #e5e7eb;

    box-shadow:
        0px 15px 0px #d1d5db,
        0px 25px 50px rgba(0,0,0,0.12);

    transition: 0.35s ease;
    overflow: hidden;
}

/* لمعة */
.card::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: rotate(25deg);
    opacity: 0;
    transition: 0.5s;
}

.card:hover::before {
    opacity: 1;
    animation: shine 1s ease;
}

@keyframes shine {
    from { transform: translateX(-100%) rotate(25deg); }
    to { transform: translateX(100%) rotate(25deg); }
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:
        0px 20px 0px #d1d5db,
        0px 35px 70px rgba(0,0,0,0.15);
}

/* الحقول */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    margin-bottom: 12px;
    box-sizing: border-box;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #10b981;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
}

/* 🔥 زر فخم */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(16,185,129,0.3);
}

button:active {
    transform: scale(0.97);
}

/* QR */
#qrDisplay {
    display: flex;
    justify-content: center;
    margin-top: 15px;
}

/* الفوائد */
.features {
    padding: 50px 20px;
    text-align: center;
}
.features h2 {
    font-size: 28px;
    margin-bottom: 30px;
}

.features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.feature {
    background: white;
    padding: 25px;
    border-radius: 18px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.feature:hover {
    transform: translateY(-6px);
}

.icon {
    font-size: 32px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🚀 أدوات <span>واتساب بزنس</span></h1>
    <p>حوّل عملائك من مشاهدة إلى تواصل مباشر خلال ثواني</p>
</div>

<div class="container">

    <div class="card">
        <h2>📲 رابط واتساب</h2>

        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>

        <div id="linkArea" style="display:none; margin-top:15px;">
            <input type="text" id="finalLink" readonly>
        </div>
    </div>

    <div class="card">
        <h2>🔳 كود QR</h2>

        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>

        <div id="qrDisplay"></div>
    </div>

</div>

<div class="features">
    <h2>وش فايدته؟</h2>

    <div class="features-grid">
        <div class="feature"><div class="icon">📞</div><h3>تواصل أسرع</h3><p>بدون حفظ الرقم</p></div>
        <div class="feature"><div class="icon">⚡</div><h3>تحويل أعلى</h3><p>كل ضغطة محادثة</p></div>
        <div class="feature"><div class="icon">📊</div><h3>احترافية</h3><p>شكل قوي</p></div>
        <div class="feature"><div class="icon">🔗</div><h3>سهل المشاركة</h3><p>في كل مكان</p></div>
    </div>
</div>

<script>
function getWaLink(pId, mId) {
    let p = document.getElementById(pId).value.replace(/\D/g, '');
    if (p.startsWith('0')) p = '966' + p.substring(1);
    else if (p.length === 9) p = '966' + p;

    let m = document.getElementById(mId).value;
    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    document.getElementById('finalLink').value = getWaLink('phone1','msg1');
    document.getElementById('linkArea').style.display = 'block';
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";
    new QRCode(container, {
        text: getWaLink('phone2','msg2'),
        width: 150,
        height: 150
    });
}
</script>

</body>
</html>
