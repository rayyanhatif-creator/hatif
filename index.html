<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل الواتس للأعمال</title>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: #333; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-whatsapp { background: #25d366; color: white; padding: 12px; border-radius: 10px; display: block; text-decoration: none; margin-top: 10px; font-weight: bold; }
        #qrcode { margin: 20px auto; width: 150px; height: 150px; }
    </style>
</head>
<body>

<main class="container">
    <section class="card">
        <h1>تواصل الواتس للأعمال</h1>
        <input type="text" id="phone" placeholder="رقم الجوال (05XXXXXXXX)">
        <input type="text" id="message" placeholder="الرسالة التلقائية (اختياري)">
        <button onclick="generateLink()">إنشاء الرابط والكود</button>
        
        <div id="result" style="display:none; margin-top:20px;">
            <input type="text" id="finalLink" readonly style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; text-align:center;">
            <button onclick="copyLink()">نسخ الرابط</button>
            <a id="waLink" href="#" target="_blank" class="btn-whatsapp">الانتقال للواتس</a>
            <div id="qrcode"></div>
        </div>
    </section>
</main>

<script>
    function generateLink() {
        let rawPhone = document.getElementById('phone').value.replace(/\D/g, '');
        let phone = rawPhone.startsWith('0') ? '966' + rawPhone.substring(1) : (rawPhone.length === 9 ? '966' + rawPhone : rawPhone);
        const msg = document.getElementById('message').value;
        
        if(phone.length >= 9) {
            let link = "https://wa.me/" + phone + (msg.trim() ? "?text=" + encodeURIComponent(msg) : "");
            document.getElementById('finalLink').value = link;
            document.getElementById('waLink').href = link;
            document.getElementById('result').style.display = 'block';
            
            // توليد الـ QR
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: link,
                width: 150,
                height: 150
            });
        } else {
            alert("تأكد من رقم الجوال");
        }
    }
    function copyLink() {
        document.getElementById("finalLink").select();
        document.execCommand("copy");
        alert("تم النسخ!");
    }
</script>
</body>
</html>
