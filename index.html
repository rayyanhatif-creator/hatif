<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدوات واتساب بزنس</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7f6;
    overflow-x: hidden;
}

/* الكونتينر */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px 15px;
    max-width: 1100px;
    margin: auto;
}

/* الكروت (الخيار 3) */
.card {
    background: white;
    width: 100%;
    max-width: 320px;
    padding: 25px;
    border-radius: 20px;
    border: 2px solid #e5e7eb; /* بوردر أقوى */
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

h2 {
    margin-bottom: 10px;
}

/* الحقول */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 12px;
    font-size: 14px;
}

/* الأزرار */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #10b981;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #059669;
}

/* QR */
#qrDisplay {
    display: flex;
    justify-content: center;
    margin-top: 15px;
}

/* الفوائد */
.features {
    padding: 60px 20px;
    text-align: center;
}

.features h2 {
    font-size: 28px;
    margin-bottom: 25px;
}

.features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.feature {
    background: white;
    padding: 25px;
    border-radius: 18px;
    border: 2px solid #e5e7eb;
}

.icon {
    font-size: 28px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- رابط واتساب -->
    <div class="card" id="linkCard">
        <h2>📲 رابط واتساب</h2>

        <input type="text" id="phone1" placeholder="05XXXXXXXX">
        <input type="text" id="msg1" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genLink()">إنشاء الرابط</button>

        <div id="linkArea" style="display:none; margin-top:10px;">
            <input type="text" id="finalLink" readonly onclick="this.select()">

            <button onclick="copyLink()" style="margin-top:10px;">
                📋 نسخ الرابط
            </button>

            <button onclick="openLink()" style="margin-top:10px; background:#0ea5e9;">
                🚀 فتح واتساب
            </button>
        </div>
    </div>

    <!-- QR -->
    <div class="card" id="qrCard">
        <h2>🔳 كود QR</h2>

        <input type="text" id="phone2" placeholder="05XXXXXXXX">
        <input type="text" id="msg2" placeholder="اكتب رسالة (اختياري)">
        <button onclick="genQR()">إنشاء QR</button>

        <div id="qrDisplay"></div>
    </div>

</div>

<!-- الفوائد -->
<div class="features">
    <h2>وش فايدته؟</h2>

    <div class="features-grid">

        <div class="feature">
            <div class="icon">🚀</div>
            <h3>يوصل العميل لك بسرعة</h3>
            <p>بضغطة وحدة يفتح المحادثة بدون حفظ الرقم.</p>
        </div>

        <div class="feature">
            <div class="icon">💰</div>
            <h3>يزيد فرص البيع</h3>
            <p>تسهيل التواصل = زيادة احتمالية الشراء.</p>
        </div>

        <div class="feature">
            <div class="icon">📱</div>
            <h3>شكل احترافي</h3>
            <p>يعطي مشروعك ثقة وتنظيم.</p>
        </div>

        <div class="feature">
            <div class="icon">🔗</div>
            <h3>يستخدم بكل مكان</h3>
            <p>موقع، انستقرام، أو حتى مطبوع.</p>
        </div>

    </div>
</div>

<script>
function copyLink() {
    let link = document.getElementById('finalLink');
    navigator.clipboard.writeText(link.value);
    alert("تم نسخ الرابط 📋");
}

function openLink() {
    let link = document.getElementById('finalLink').value;

    if (!link) {
        alert("ما فيه رابط بعد");
        return;
    }

    window.open(link, "_blank");
}

function getWaLink(phoneId, msgId) {
    let p = document.getElementById(phoneId).value.replace(/\D/g, '');
    let m = document.getElementById(msgId).value;

    if (p.startsWith('0')) p = '966' + p.substring(1);
    else if (p.length === 9) p = '966' + p;

    return "https://wa.me/" + p + (m ? "?text=" + encodeURIComponent(m) : "");
}

function genLink() {
    let link = getWaLink('phone1','msg1');

    if (!link.includes("966")) {
        alert("اكتب رقم صحيح");
        return;
    }

    document.getElementById('finalLink').value = link;
    document.getElementById('linkArea').style.display = 'block';
}

function genQR() {
    let container = document.getElementById("qrDisplay");
    container.innerHTML = "";

    let link = getWaLink('phone2','msg2');

    if (!link.includes("966")) {
        alert("اكتب رقم صحيح");
        return;
    }

    new QRCode(container, {
        text: link,
        width: 150,
        height: 150
    });
}

function arrange() {
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");

    const container = document.getElementById("container");
    const link = document.getElementById("linkCard");
    const qr = document.getElementById("qrCard");

    if (type === "qr") container.prepend(qr);
    else if (type === "link") container.prepend(link);
}

arrange();
</script>

</body>
</html>
